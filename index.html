<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habit Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Habit Tracker</h1>
      <p>Track your daily habits with multiple check-ins.</p>
    </header>

    <section class="card add-habit">
      <h2>Add a Habit</h2>
      <div class="form-row">
        <input id="habitInput" type="text" placeholder="Enter a habit name" />
        <input id="habitColor" type="color" value="#e85d75" title="Pick a color" />
        <button id="addHabitBtn">Add</button>
      </div>
    </section>

    <section class="card">
      <h2>Today's Habits</h2>
      <div id="habitList" class="habit-list"></div>
      <p id="emptyState" class="empty-state">No habits yet. Add your first one above.</p>
    </section>

    <section class="card trend-card">
      <div class="trend-header">
        <div>
          <h2>Trend</h2>
          <p class="trend-subtitle">Track daily counts by week, month, and year.</p>
        </div>
      </div>

      <div class="trend-summary" id="trendSummary"></div>

      <div class="trend-controls">
        <div class="view-toggle">
          <button class="view-btn active" data-view="week">Week</button>
          <button class="view-btn" data-view="month">Month</button>
          <button class="view-btn" data-view="year">Year</button>
        </div>

        <div class="date-nav">
          <button id="prevPeriodBtn" class="nav-btn">‹</button>
          <span id="periodLabel"></span>
          <button id="nextPeriodBtn" class="nav-btn">›</button>
        </div>
      </div>

      <div id="trendGrid" class="trend-grid"></div>
    </section>
  </div>

  <!-- Edit Modal -->
  <div id="editModal" class="modal hidden">
    <div class="modal-content">
      <h3>Edit Habit</h3>

      <label class="modal-label" for="editHabitName">Habit name</label>
      <input id="editHabitName" type="text" />

      <label class="modal-label" for="editHabitColor">Habit color</label>
      <input id="editHabitColor" type="color" />

      <div class="modal-actions">
        <button id="cancelEditBtn" class="secondary-btn" type="button">Cancel</button>
        <button id="saveEditBtn" type="button">Save</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
